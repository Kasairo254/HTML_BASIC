<form>
    <label for="FN">full name:</label>
    <input type="text" id="FN" required placeholder="please enter full name"> <br> <br>
    <label for="">Email addres</label>
    <input type="email" id="email" required placeholder="enter email"> <br> <br> 
    <label for="">Age</label>
    <input type="number" id="age" required placeholder="enter age"> <br> <br>
    <label >gender:</label> <br>

    <input type="radio" id="male" name="gender"> <br>
    <label for="female">female</label>    <input type="radio" id="female" name="gender"> <br>
    <label for="">course:</label>

    <option value="MIT">full stack software development</option>
        <option value="CYBER">cybersecurity</option>
        <option value="DATA">data science</option>
        <option value="AI">artificial intelligence</option>
    </select> <br><br>
    <label for="terms">Agreed terms and condition</label>
    <input type="checkbox" id="terms"><br><br>
    <label for="message">Tell us about yourself</label> <br>
    <textarea name="" id="message" cols="30" rows="5"></textarea><br>



    <button type="submit">submit data</button>
